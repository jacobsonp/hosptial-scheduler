<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VetScheduler Pro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #EEF2F7; color: #1E293B;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── TOP NAV ── */
.top-nav {
  height: 40px; background: #0A1F33;
  display: flex; align-items: center; padding: 0 14px; gap: 6px; flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.nav-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 5px; transition: all 0.15s; }
.nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
.nav-link.active { color: white; background: rgba(255,255,255,0.15); }
.nav-sep { color: rgba(255,255,255,0.2); font-size: 11px; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.nav-user { color: rgba(255,255,255,0.55); font-size: 11.5px; }
.nav-logout { color: rgba(255,255,255,0.5); background: none; border: 1px solid rgba(255,255,255,0.18); border-radius: 5px; padding: 3px 9px; font-size: 11.5px; cursor: pointer; transition: all 0.15s; }
.nav-logout:hover { color: white; border-color: rgba(255,255,255,0.4); }

/* ── HEADER ── */
header {
  height: 54px; background: #0F2D4A; color: white;
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
header h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
.location-badge { font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.15); padding: 3px 9px; border-radius: 10px; color: rgba(255,255,255,0.85); }
.loc-selector { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 7px; padding: 4px 8px; font-size: 12px; cursor: pointer; max-width: 200px; }
.loc-selector:focus { outline: none; }
.loc-selector option { color: #1E293B; background: white; }
.week-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.week-nav button { background: rgba(255,255,255,0.13); border: none; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.week-nav button:hover { background: rgba(255,255,255,0.25); }
.week-nav .today-btn { width: auto; padding: 0 10px; font-size: 12px; font-weight: 600; }
.week-label { font-size: 13px; font-weight: 500; min-width: 190px; text-align: center; color: rgba(255,255,255,0.9); }

/* ── OUTER LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 190px; background: white; border-right: 1px solid #D4DBE5;
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sidebar-body { flex: 1; overflow-y: auto; padding: 12px; }
.add-person-btn {
  display: flex; align-items: center; gap: 6px; width: 100%;
  padding: 8px 10px; margin-bottom: 8px; border-radius: 7px;
  border: 1px dashed #C8D5E2; background: none; font-size: 12px; font-weight: 600;
  color: #3B82F6; cursor: pointer; transition: all 0.15s;
}
.add-person-btn:hover { background: #EFF6FF; border-color: #3B82F6; }
.add-person-btn:disabled { color: #CBD5E1; border-color: #E2E8F0; cursor: not-allowed; }

.settings-panel { padding: 10px 12px 12px; border-top: 1px solid #E2E8F0; background: #F8FAFC; flex-shrink: 0; }
.settings-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #64748B; margin-bottom: 9px; }
.setting-row { margin-bottom: 9px; }
.setting-label { font-size: 11px; color: #64748B; margin-bottom: 3px; display: block; }
.setting-input-row { display: flex; align-items: center; gap: 6px; }
.setting-input { width: 58px; padding: 4px 7px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 13px; font-weight: 600; color: #1E293B; background: white; }
.setting-input:focus { outline: none; border-color: #3B82F6; }
.setting-unit { font-size: 10px; color: #64748B; }

/* ── MAIN GRID AREA ── */
.schedule-main { flex: 1; overflow: auto; display: flex; flex-direction: column; }

/* ── SCHEDULE TABLE ── */
.sched-wrap { padding: 0; }

table.sched-table { border-collapse: collapse; width: 100%; }

/* Header row */
.sched-table thead th {
  position: sticky; top: 0; z-index: 10;
  padding: 0; text-align: center; font-weight: 700;
  background: #1E2A38; color: white; border-right: 1px solid rgba(255,255,255,0.1);
  white-space: nowrap;
}
.sched-table thead th.name-th {
  width: 190px; min-width: 190px; text-align: left;
  background: #0F2D4A; border-right: 2px solid rgba(255,255,255,0.15);
}
.name-th-inner { padding: 10px 12px; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; text-transform: uppercase; }
.day-th-inner { padding: 8px 6px 5px; }
.dth-top { display: flex; align-items: baseline; justify-content: center; gap: 5px; }
.dth-name { font-size: 13px; font-weight: 700; }
.dth-date { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.6); }
.dth-metrics { font-size: 9.5px; color: rgba(255,255,255,0.5); margin-top: 3px; min-height: 14px; }
.sched-table thead th.today-th { background: #1D4ED8; }
.sched-table thead th.today-th .dth-metrics { color: rgba(255,255,255,0.7); }

/* Visit count row */
.visit-row td { background: #FFF7ED; border-bottom: 2px solid #FED7AA; }
.visit-name-cell {
  padding: 8px 12px; font-size: 12px; font-weight: 700; color: #9A3412;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.visit-day-cell { text-align: center; padding: 5px 8px; border-right: 1px solid #FDE8C8; }
.visit-in {
  width: 64px; padding: 5px 4px; border: 1.5px solid #FCA16A; border-radius: 6px;
  font-size: 18px; font-weight: 800; text-align: center; color: #9A3412;
  background: white;
}
.visit-in:focus { outline: none; border-color: #EA580C; box-shadow: 0 0 0 2px rgba(234,88,12,0.2); }
.visit-in[readonly] { border-color: #FDE8C8; background: transparent; cursor: default; }
.visit-count-ro { font-size: 20px; font-weight: 800; color: #9A3412; }

/* Section header rows */
.section-hdr-row td {
  padding: 5px 12px; font-size: 10px; font-weight: 800; letter-spacing: 0.8px;
  text-transform: uppercase; border-bottom: 1px solid #E2E8F0;
}
.dvm-section-hdr { background: #EEF3FF; color: #3730A3; border-top: 2px solid #C7D2FE; }
.staff-section-hdr { background: #ECFDF5; color: #065F46; border-top: 2px solid #A7F3D0; }
.section-add-btn {
  float: right; background: none; border: 1px solid currentColor; border-radius: 4px;
  padding: 1px 7px; font-size: 10px; font-weight: 700; cursor: pointer;
  color: inherit; opacity: 0.7; transition: opacity 0.15s;
}
.section-add-btn:hover { opacity: 1; }
.section-add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Person rows */
.person-row td { border-bottom: 1px solid #EEF2F7; }
.person-row:hover td { background-color: rgba(0,0,0,0.015); }

/* Name cell */
.name-cell {
  padding: 0; min-width: 190px; max-width: 190px; width: 190px;
  border-right: 2px solid #D4DBE5; vertical-align: middle;
  position: relative;
}
.name-cell-inner {
  padding: 8px 10px 8px 14px; display: flex; align-items: flex-start; gap: 7px;
}
.p-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.p-info { flex: 1; min-width: 0; }
.p-name { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-role { font-size: 10.5px; color: #64748B; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-stats { font-size: 10px; color: #94A3B8; margin-top: 3px; }
.rm-person-btn {
  position: absolute; right: 5px; top: 5px; background: none; border: none;
  font-size: 14px; color: #CBD5E1; cursor: pointer; line-height: 1; padding: 2px;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.name-cell:hover .rm-person-btn { opacity: 1; }
.rm-person-btn:hover { color: #EF4444; }

/* Day cells */
.day-cell {
  min-width: 135px; max-width: 155px; vertical-align: middle;
  border-right: 1px solid #E8EFF6; padding: 0; position: relative;
}
.day-cell.today-cell { background: #EFF6FF !important; }

/* Empty (unscheduled) cell */
.empty-cell { text-align: center; background: #FAFBFC; }
.add-day-btn {
  width: 100%; min-height: 56px; background: none; border: none;
  font-size: 16px; color: #CBD5E1; cursor: pointer; transition: all 0.15s;
}
.add-day-btn:hover { color: #3B82F6; background: #EFF6FF; }

/* Scheduled cell */
.sched-cell { padding: 5px 7px; }
.cell-inner-grid { display: flex; align-items: center; gap: 4px; justify-content: space-between; }
.hr-inputs { display: flex; gap: 5px; }
.hr-grp { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.hr-in {
  width: 36px; padding: 3px 2px; border: 1px solid #D1D5DB;
  border-radius: 5px; font-size: 12px; font-weight: 700;
  text-align: center; color: #1E293B; background: white;
}
.hr-in:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
.hr-in[readonly] { border-color: transparent; background: transparent; cursor: default; }
.hr-lbl { font-size: 8.5px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
.hr-val { font-size: 12px; font-weight: 700; min-width: 28px; text-align: center; display: inline-block; }

.rm-day-btn {
  background: none; border: none; font-size: 15px; color: #CBD5E1; cursor: pointer;
  padding: 3px; line-height: 1; flex-shrink: 0; opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.sched-cell:hover .rm-day-btn { opacity: 1; }
.rm-day-btn:hover { color: #EF4444; }

/* Metrics footer row */
.metrics-row td {
  padding: 5px 8px; font-size: 10px; color: #64748B; background: #F8FAFC;
  border-top: 2px solid #E2E8F0; text-align: center;
}
.metrics-row .name-cell { text-align: left; font-size: 10px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; padding: 5px 12px; border-right: 2px solid #D4DBE5; }
.mday-cell { vertical-align: middle; }

/* Status chips */
.chip { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 4px; white-space: nowrap; }
.chip-ok  { background: #DCFCE7; color: #15803D; }
.chip-low { background: #FEE2E2; color: #B91C1C; }
.chip-hi  { background: #DBEAFE; color: #1D4ED8; }
.chip-na  { background: #F1F5F9; color: #94A3B8; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(3px);
}
.modal-box { background: white; border-radius: 12px; padding: 22px 24px 20px; width: 310px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-box h2 { font-size: 15px; font-weight: 700; margin-bottom: 15px; color: #0F2D4A; }
.form-group { margin-bottom: 11px; }
.form-label { display: block; font-size: 11.5px; font-weight: 600; color: #374151; margin-bottom: 4px; }
.form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid #D1D5DB; border-radius: 7px; font-size: 13px; color: #111827; background: white; }
.form-input:focus, .form-select:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: #2563EB; color: white; flex: 1; }
.btn-primary:hover { background: #1D4ED8; }
.btn-secondary { background: #F1F5F9; color: #475569; }
.btn-secondary:hover { background: #E2E8F0; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #C4CDD8; border-radius: 2px; }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="/scheduler.html" class="nav-link active">Schedule</a>
  <span class="nav-sep" id="corpRollupSep" style="display:none">|</span>
  <a href="/corporate.html" class="nav-link" id="corpRollupLink" style="display:none">Corporate Rollup</a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="nav-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<header>
  <h1>🐾 VetScheduler Pro</h1>
  <span class="location-badge" id="locationBadge" style="display:none"></span>
  <select class="loc-selector" id="locationSelector" style="display:none" onchange="switchLocation(this.value)"></select>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8249;</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">&#8250;</button>
    <button class="today-btn" onclick="changeWeek(0)">Today</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-body">
      <button class="add-person-btn" id="addDvmBtn" onclick="openAddModal('dvm')">+ Add DVM</button>
      <button class="add-person-btn" id="addStaffBtn" onclick="openAddModal('staff')">+ Add Support Staff</button>
    </div>
    <div class="settings-panel">
      <div class="settings-title">&#9881; Daily Targets</div>
      <div class="setting-row">
        <label class="setting-label">Visits per DVM hour</label>
        <div class="setting-input-row">
          <input type="number" class="setting-input" id="tgtVisits" min="0.1" max="20" step="0.1"
                 onchange="setTarget('visitsPerDVMHour', this.value)">
          <span class="setting-unit">vis/DVM-hr</span>
        </div>
      </div>
      <div class="setting-row">
        <label class="setting-label">Support hours per DVM hour</label>
        <div class="setting-input-row">
          <input type="number" class="setting-input" id="tgtSupport" min="0.1" max="10" step="0.1"
                 onchange="setTarget('supportPerDVMHour', this.value)">
          <span class="setting-unit">sup/DVM-hr</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="schedule-main">
    <div class="sched-wrap" id="schedWrap"></div>
  </main>
</div>

<!-- ADD PERSON MODAL -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h2 id="addModalTitle">Add Person</h2>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="pName" placeholder="Full name">
    </div>
    <div class="form-group">
      <label class="form-label" id="pSubLabel">Specialty</label>
      <input type="text" class="form-input" id="pSub" placeholder="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="commitAddPerson()">Add</button>
    </div>
  </div>
</div>

<script>
'use strict';

const DAY_NAMES  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DVM_PALETTE   = ['#3B82F6','#7C3AED','#DB2777','#F59E0B','#0D9488','#EF4444','#0EA5E9','#F97316'];
const STAFF_PALETTE = ['#16A34A','#0891B2','#7C3AED','#D97706','#BE123C','#0369A1','#15803D','#9333EA'];

let user        = null;
let locationId  = null;
let allLocations = [];
let isReadOnly  = false;
let S = {
  targets: { visitsPerDVMHour: 2.5, supportPerDVMHour: 1.5 },
  dvms:    [],
  staff:   [],
  schedule: {},
  weekOffset: 0,
  uid: 1,
};
let dirtyDates = new Set();

// ── AUTH ───────────────────────────────────────────────────

async function checkAuth() {
  const res = await fetch('/api/auth/me');
  if (!res.ok) { window.location.href = '/login.html'; return null; }
  return res.json();
}
async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

// ── DATE HELPERS ───────────────────────────────────────────

function getMonday(ref) {
  const d = new Date(ref); const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); d.setHours(0,0,0,0); return d;
}
function weekStart() {
  const m = getMonday(new Date()); m.setDate(m.getDate() + S.weekOffset * 7); return m;
}
function weekStartStr() { return weekStart().toISOString().split('T')[0]; }
function weekDates() {
  const s = weekStart();
  return Array.from({length:7}, (_,i) => { const d = new Date(s); d.setDate(s.getDate()+i); return d.toISOString().split('T')[0]; });
}
function dayKey(di)  { const d = new Date(weekStart()); d.setDate(d.getDate()+di); return d.toISOString().split('T')[0]; }
function isToday(di) { const d = new Date(weekStart()); d.setDate(d.getDate()+di); return d.toDateString() === new Date().toDateString(); }
function fmtDate(d)  { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function weekLabel() {
  const s = weekStart(), e = new Date(s); e.setDate(e.getDate()+6);
  return `${fmtDate(s)} \u2013 ${fmtDate(e)}, ${e.getFullYear()}`;
}
function daySchedule(di) {
  const k = dayKey(di);
  if (!S.schedule[k]) S.schedule[k] = { dvms: [], staff: [], visitCount: 0 };
  return S.schedule[k];
}

// ── METRICS ────────────────────────────────────────────────

function metrics(di) {
  const day  = daySchedule(di);
  const dvmH = day.dvms.reduce((s,a) => s + (+a.workHours || 0), 0);
  const supH = day.staff.reduce((s,a) => s + (+a.workHours || 0), 0);
  const vis  = day.visitCount || 0;
  const vRatio = dvmH > 0 ? vis  / dvmH : null;
  const sRatio = dvmH > 0 ? supH / dvmH : null;
  return { dvmH, supH, vis, vRatio, sRatio, hasData: dvmH > 0 };
}

function chipClass(ratio, target) {
  if (ratio === null || target === 0) return 'chip-na';
  const r = ratio / target;
  if (r >= 0.88 && r <= 1.12) return 'chip-ok';
  return r < 0.88 ? 'chip-low' : 'chip-hi';
}

// ── LOAD DATA ──────────────────────────────────────────────

async function loadPeople() {
  const res  = await fetch(`/api/locations/${locationId}/people`);
  const data = await res.json();
  S.dvms  = data.dvms.map(d  => ({ id: String(d.id), name: d.name, sub: d.specialty,   color: d.color }));
  S.staff = data.staff.map(s => ({ id: String(s.id), name: s.name, sub: s.role_title,  color: s.color }));
}

async function loadSchedule() {
  const res  = await fetch(`/api/locations/${locationId}/schedule?week=${weekStartStr()}`);
  const data = await res.json();
  S.schedule = {};
  Object.entries(data.schedule).forEach(([date, day]) => {
    S.schedule[date] = {
      dvms:  day.dvms.map(a  => ({ id:'a'+(S.uid++), personId:String(a.person_id), workHours: a.hours, breakHours: a.break_hours||0, timeOffHours: a.time_off_hours||0 })),
      staff: day.staff.map(a => ({ id:'a'+(S.uid++), personId:String(a.person_id), workHours: a.hours, breakHours: a.break_hours||0, timeOffHours: a.time_off_hours||0 })),
      visitCount: day.visitCount || 0,
    };
  });
  S.targets.visitsPerDVMHour  = data.settings.visits_per_dvm_hour;
  S.targets.supportPerDVMHour = data.settings.support_per_dvm_hour;
}

// ── SAVE ───────────────────────────────────────────────────

function markDirty(date) { if (!isReadOnly) dirtyDates.add(date); }
async function flushSave() {
  if (isReadOnly || dirtyDates.size === 0) return;
  const dates = [...dirtyDates]; dirtyDates.clear();
  await Promise.all(dates.map(saveDay));
}
async function saveDay(date) {
  const day = S.schedule[date] || { dvms:[], staff:[], visitCount:0 };
  await fetch(`/api/locations/${locationId}/schedule/${date}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      dvms:  day.dvms.map(a  => ({ personId:a.personId, hours:a.workHours, breakHours:a.breakHours,  timeOffHours:a.timeOffHours })),
      staff: day.staff.map(a => ({ personId:a.personId, hours:a.workHours, breakHours:a.breakHours,  timeOffHours:a.timeOffHours })),
      visitCount: day.visitCount || 0,
    }),
  });
}
async function saveSettings() {
  if (isReadOnly) return;
  await fetch(`/api/locations/${locationId}/settings`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ visitsPerDVMHour: S.targets.visitsPerDVMHour, supportPerDVMHour: S.targets.supportPerDVMHour }),
  });
}

// ── RENDER ─────────────────────────────────────────────────

function renderAll() {
  document.getElementById('weekLabel').textContent = weekLabel();
  document.getElementById('tgtVisits').value  = S.targets.visitsPerDVMHour;
  document.getElementById('tgtSupport').value = S.targets.supportPerDVMHour;
  renderGrid();
}

function renderGrid() {
  const dates = weekDates();

  // ─── Header ───
  let html = `<table class="sched-table"><thead><tr>
    <th class="name-th"><div class="name-th-inner">Staff</div></th>`;
  dates.forEach((d, i) => {
    const m    = metrics(i);
    const isT  = isToday(i);
    const date = new Date(d + 'T00:00:00');
    const vCls = chipClass(m.vRatio, S.targets.visitsPerDVMHour);
    const sCls = chipClass(m.sRatio, S.targets.supportPerDVMHour);
    let metStr = '';
    if (m.hasData) {
      metStr = `${m.dvmH}h DVM &middot; ${m.supH}h Sup &middot; ${m.vis} vis`;
    } else if (m.vis > 0) {
      metStr = `${m.vis} visits`;
    }
    html += `<th class="day-th${isT?' today-th':''}">
      <div class="day-th-inner">
        <div class="dth-top">
          <span class="dth-name">${DAY_SHORT[i]}</span>
          <span class="dth-date">${date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
        </div>
        <div class="dth-metrics" id="dhm-${i}">${metStr}</div>
      </div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  // ─── Visit count row ───
  html += `<tr class="visit-row">
    <td class="name-cell visit-name-cell">&#128203; Patient Visits</td>`;
  dates.forEach((d, i) => {
    const cnt = (S.schedule[d] || {}).visitCount || 0;
    html += `<td class="visit-day-cell${isToday(i)?' today-cell':''}">`;
    if (isReadOnly) {
      html += `<span class="visit-count-ro">${cnt}</span>`;
    } else {
      html += `<input type="number" class="visit-in" value="${cnt}" min="0" step="1"
        onchange="updateVisitCount(${i},this.value)" onclick="event.stopPropagation()">`;
    }
    html += `</td>`;
  });
  html += `</tr>`;

  // ─── DVMs ───
  const addDvmBtn = isReadOnly ? '' : `<button class="section-add-btn" onclick="openAddModal('dvm')" title="Add DVM">+ Add DVM</button>`;
  html += `<tr class="section-hdr-row"><td colspan="${1+7}" class="section-hdr-cell dvm-section-hdr">${addDvmBtn}DVMs</td></tr>`;
  S.dvms.forEach(p => { html += personRow(p, 'dvm', dates); });

  // ─── Support Staff ───
  const addStaffBtn = isReadOnly ? '' : `<button class="section-add-btn" onclick="openAddModal('staff')" title="Add staff">+ Add Staff</button>`;
  html += `<tr class="section-hdr-row"><td colspan="${1+7}" class="section-hdr-cell staff-section-hdr">${addStaffBtn}Support Staff</td></tr>`;
  S.staff.forEach(p => { html += personRow(p, 'staff', dates); });

  html += `</tbody></table>`;
  document.getElementById('schedWrap').innerHTML = html;
}

function personRow(person, type, dates) {
  // Compute week stats
  let shifts = 0, totalWork = 0, totalBreak = 0, totalOff = 0;
  dates.forEach(d => {
    const day = S.schedule[d]; if (!day) return;
    const arr = type === 'dvm' ? day.dvms : day.staff;
    const a   = arr.find(x => x.personId === person.id);
    if (a) { shifts++; totalWork += +a.workHours||0; totalBreak += +a.breakHours||0; totalOff += +a.timeOffHours||0; }
  });

  const statParts = [`${shifts} shift${shifts!==1?'s':''}`];
  if (totalWork > 0) statParts.push(`${totalWork}h work`);
  if (totalBreak > 0) statParts.push(`${totalBreak}h break`);
  if (totalOff > 0) statParts.push(`${totalOff}h off`);

  const rmBtn = isReadOnly ? '' :
    `<button class="rm-person-btn" onclick="deletePersonFromPool('${type}','${person.id}',event)" title="Remove">&times;</button>`;

  let row = `<tr class="person-row" data-pid="${person.id}" data-ptype="${type}">
    <td class="name-cell" style="border-left:3px solid ${person.color}">
      <div class="name-cell-inner">
        <span class="p-dot" style="background:${person.color}"></span>
        <div class="p-info">
          <div class="p-name" style="color:${person.color}">${esc(person.name)}</div>
          <div class="p-role">${esc(person.sub)}</div>
          <div class="p-stats">${statParts.join(' &middot; ')}</div>
        </div>
      </div>
      ${rmBtn}
    </td>`;

  dates.forEach((d, i) => {
    const day = S.schedule[d] || { dvms:[], staff:[], visitCount:0 };
    const arr = type === 'dvm' ? day.dvms : day.staff;
    const a   = arr.find(x => x.personId === person.id);
    const isT = isToday(i);
    const bg  = a ? `background:${hexAlpha(person.color, 0.07)}` : '';

    if (!a) {
      row += `<td class="day-cell empty-cell${isT?' today-cell':''}" style="${bg}">`;
      if (!isReadOnly) {
        row += `<button class="add-day-btn" onclick="addPersonToDay('${person.id}','${type}',${i})" title="Add to ${DAY_SHORT[i]}">+</button>`;
      }
      row += `</td>`;
    } else {
      const rmDayBtn = isReadOnly ? '' :
        `<button class="rm-day-btn" onclick="removeFromDay('${type}','${a.id}',${i})" title="Remove">&times;</button>`;

      if (isReadOnly) {
        row += `<td class="day-cell sched-cell${isT?' today-cell':''}" style="${bg}">
          <div class="cell-inner-grid">
            <div class="hr-inputs">
              <div class="hr-grp"><span class="hr-val">${a.workHours}</span><span class="hr-lbl">Work</span></div>
              <div class="hr-grp"><span class="hr-val">${a.breakHours}</span><span class="hr-lbl">Break</span></div>
              <div class="hr-grp"><span class="hr-val">${a.timeOffHours}</span><span class="hr-lbl">Off</span></div>
            </div>
          </div>
        </td>`;
      } else {
        row += `<td class="day-cell sched-cell${isT?' today-cell':''}" style="${bg}">
          <div class="cell-inner-grid">
            <div class="hr-inputs">
              <div class="hr-grp">
                <input type="number" class="hr-in" value="${a.workHours}" min="0" max="24" step="0.5"
                  onchange="updateHourField('${type}','${a.id}',${i},'workHours',this.value)"
                  onclick="event.stopPropagation()" title="Working hours">
                <span class="hr-lbl">Work</span>
              </div>
              <div class="hr-grp">
                <input type="number" class="hr-in" value="${a.breakHours}" min="0" max="24" step="0.5"
                  onchange="updateHourField('${type}','${a.id}',${i},'breakHours',this.value)"
                  onclick="event.stopPropagation()" title="Break hours">
                <span class="hr-lbl">Break</span>
              </div>
              <div class="hr-grp">
                <input type="number" class="hr-in" value="${a.timeOffHours}" min="0" max="24" step="0.5"
                  onchange="updateHourField('${type}','${a.id}',${i},'timeOffHours',this.value)"
                  onclick="event.stopPropagation()" title="Time off hours">
                <span class="hr-lbl">Off</span>
              </div>
            </div>
            ${rmDayBtn}
          </div>
        </td>`;
      }
    }
  });

  row += `</tr>`;
  return row;
}

// ── ACTIONS ────────────────────────────────────────────────

function addPersonToDay(personId, type, di) {
  if (isReadOnly) return;
  const day = daySchedule(di);
  const arr = type === 'dvm' ? day.dvms : day.staff;
  if (arr.some(a => a.personId === personId)) return;
  arr.push({ id:'a'+(S.uid++), personId, workHours:8, breakHours:0, timeOffHours:0 });
  markDirty(dayKey(di)); flushSave(); renderGrid();
}

function removeFromDay(type, assignId, di) {
  if (isReadOnly) return;
  const day = daySchedule(di);
  if (type === 'dvm') day.dvms  = day.dvms.filter(a  => a.id !== assignId);
  else                day.staff = day.staff.filter(a => a.id !== assignId);
  markDirty(dayKey(di)); flushSave(); renderGrid();
}

function updateHourField(type, assignId, di, field, val) {
  const v   = Math.max(0, Math.min(24, parseFloat(val) || 0));
  const day = daySchedule(di);
  const arr = type === 'dvm' ? day.dvms : day.staff;
  const a   = arr.find(x => x.id === assignId);
  if (a) a[field] = v;
  markDirty(dayKey(di)); flushSave();
  refreshDayMetric(di); refreshPersonStats(type, a ? a.personId : null);
}

function updateVisitCount(di, val) {
  const date = dayKey(di);
  if (!S.schedule[date]) S.schedule[date] = { dvms:[], staff:[], visitCount:0 };
  S.schedule[date].visitCount = Math.max(0, parseInt(val) || 0);
  markDirty(date); flushSave();
  refreshDayMetric(di);
}

function refreshDayMetric(di) {
  const el = document.getElementById('dhm-' + di);
  if (!el) return;
  const m = metrics(di);
  if (m.hasData) {
    el.innerHTML = `${m.dvmH}h DVM &middot; ${m.supH}h Sup &middot; ${m.vis} vis`;
  } else {
    el.innerHTML = m.vis > 0 ? `${m.vis} visits` : '';
  }
}

function refreshPersonStats(type, personId) {
  if (!personId) return;
  const row = document.querySelector(`tr[data-pid="${personId}"][data-ptype="${type}"]`);
  if (!row) return;
  const dates = weekDates();
  let shifts=0, totalWork=0, totalBreak=0, totalOff=0;
  dates.forEach(d => {
    const day = S.schedule[d]; if (!day) return;
    const arr = type==='dvm' ? day.dvms : day.staff;
    const a   = arr.find(x => x.personId === personId);
    if (a) { shifts++; totalWork += +a.workHours||0; totalBreak += +a.breakHours||0; totalOff += +a.timeOffHours||0; }
  });
  const statsEl = row.querySelector('.p-stats');
  if (!statsEl) return;
  const parts = [`${shifts} shift${shifts!==1?'s':''}`];
  if (totalWork  > 0) parts.push(`${totalWork}h work`);
  if (totalBreak > 0) parts.push(`${totalBreak}h break`);
  if (totalOff   > 0) parts.push(`${totalOff}h off`);
  statsEl.innerHTML = parts.join(' &middot; ');
}

async function deletePersonFromPool(type, id, e) {
  e.stopPropagation();
  const url = type === 'dvm'
    ? `/api/locations/${locationId}/dvms/${id}`
    : `/api/locations/${locationId}/staff/${id}`;
  await fetch(url, { method:'DELETE' });
  if (type === 'dvm') {
    S.dvms = S.dvms.filter(d => d.id !== String(id));
    Object.values(S.schedule).forEach(day => { day.dvms = day.dvms.filter(a => a.personId !== String(id)); });
  } else {
    S.staff = S.staff.filter(s => s.id !== String(id));
    Object.values(S.schedule).forEach(day => { day.staff = day.staff.filter(a => a.personId !== String(id)); });
  }
  renderGrid();
}

function setTarget(key, val) {
  S.targets[key] = Math.max(0.1, parseFloat(val) || 1);
  saveSettings(); renderGrid();
}

async function changeWeek(delta) {
  S.weekOffset = delta === 0 ? 0 : S.weekOffset + delta;
  await loadSchedule(); renderAll();
}

// ── ADD PERSON MODAL ───────────────────────────────────────

let addPersonType = null;

function openAddModal(type) {
  addPersonType = type;
  document.getElementById('pName').value = '';
  document.getElementById('pSub').value  = '';
  if (type === 'dvm') {
    document.getElementById('addModalTitle').textContent = '+ Add DVM';
    document.getElementById('pSubLabel').textContent     = 'Specialty';
    document.getElementById('pSub').placeholder         = 'e.g. General Practice';
  } else {
    document.getElementById('addModalTitle').textContent = '+ Add Support Staff';
    document.getElementById('pSubLabel').textContent     = 'Role';
    document.getElementById('pSub').placeholder         = 'e.g. Vet Tech';
  }
  document.getElementById('addModal').style.display = 'flex';
  setTimeout(() => document.getElementById('pName').focus(), 50);
}

async function commitAddPerson() {
  const name = document.getElementById('pName').value.trim();
  if (!name) return;
  const sub  = document.getElementById('pSub').value.trim();
  const url  = addPersonType === 'dvm'
    ? `/api/locations/${locationId}/dvms`
    : `/api/locations/${locationId}/staff`;
  const body = addPersonType === 'dvm'
    ? { name, specialty:  sub || 'General Practice', color: DVM_PALETTE[S.dvms.length % DVM_PALETTE.length] }
    : { name, role_title: sub || 'Support Staff',    color: STAFF_PALETTE[S.staff.length % STAFF_PALETTE.length] };
  const res    = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const person = await res.json();
  if (addPersonType === 'dvm') {
    S.dvms.push({ id:String(person.id), name:person.name, sub:person.specialty,  color:person.color });
  } else {
    S.staff.push({ id:String(person.id), name:person.name, sub:person.role_title, color:person.color });
  }
  closeModal(); renderGrid();
}

function closeModal() { document.getElementById('addModal').style.display = 'none'; }

// ── KEYBOARD ───────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('addModal').style.display !== 'none') commitAddPerson();
});

// ── LOCATION SWITCHER ─────────────────────────────────────

async function switchLocation(locId) {
  locationId = locId;
  const url = new URL(window.location.href);
  url.searchParams.set('loc', locId);
  window.history.replaceState({}, '', url);
  await loadPeople(); await loadSchedule(); renderAll();
}

// ── UTILITY ────────────────────────────────────────────────

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────

async function init() {
  user = await checkAuth(); if (!user) return;
  document.getElementById('navUser').textContent = user.username;

  if (user.role === 'corporate') {
    document.getElementById('corpRollupSep').style.display  = '';
    document.getElementById('corpRollupLink').style.display = '';
    const res    = await fetch('/api/locations');
    allLocations = await res.json();
    const params = new URLSearchParams(window.location.search);
    locationId   = params.get('loc') || String(allLocations[0]?.id);
    isReadOnly   = true;
    const sel    = document.getElementById('locationSelector');
    sel.style.display = '';
    allLocations.forEach(loc => {
      const opt = document.createElement('option');
      opt.value = loc.id; opt.textContent = loc.name;
      opt.selected = String(loc.id) === String(locationId);
      sel.appendChild(opt);
    });
    document.getElementById('addDvmBtn').disabled   = true;
    document.getElementById('addStaffBtn').disabled = true;
  } else {
    locationId = user.locationId;
    const res  = await fetch('/api/locations');
    const locs = await res.json();
    const loc  = locs.find(l => String(l.id) === String(locationId));
    const badge = document.getElementById('locationBadge');
    badge.textContent = loc?.name || ''; badge.style.display = '';
    if (user.role === 'staff') {
      isReadOnly = true;
      document.getElementById('addDvmBtn').disabled   = true;
      document.getElementById('addStaffBtn').disabled = true;
    }
  }

  await loadPeople(); await loadSchedule(); renderAll();
}

init();
</script>
